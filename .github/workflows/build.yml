name: Build Nekogram

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Google Services
        run: |
          modules=("TMessagesProj" "TMessagesProj_App")
          echo "${{ secrets.GOOGLE_SERVICES_BASE64 }}" | base64 --decode > /tmp/google-services.json

          for module in "${modules[@]}"; do
            if [ -d "$module" ] || [ "$module" == "TMessagesProj_App" ]; then
              mkdir -p "$module"
              cp /tmp/google-services.json "$module/google-services.json"
              echo "✅ Добавлено в $module/"
            fi
          done

          rm /tmp/google-services.json

      - name: Build unsigned APK
        run: ./gradlew assembleRelease

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Sign APK
        run: |
          # Находим все неподписанные APK
          find . -name "*-release-unsigned.apk" -o -name "*.apk" ! -name "*-signed.apk" | while read apk; do
            echo "Подписываем: $apk"
            
            # Создаем имя для подписанного файла
            signed_apk="${apk%.apk}-signed.apk"
            
            # Подписываем APK
            apksigner sign --ks keystore.jks \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out "$signed_apk" "$apk"
            
            # Заменяем оригинал подписанной версией
            mv "$signed_apk" "$apk"
            
            echo "✅ Подписан: $apk"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nekogram-apk
          path: |
            TMessagesProj_App/build/outputs/apk/release/*.apk
            TMessagesProj/build/outputs/apk/release/*.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            TMessagesProj_App/build/outputs/apk/release/*.apk
            TMessagesProj/build/outputs/apk/release/*.apk
