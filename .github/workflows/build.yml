name: Build Nekogram

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Восстанавливаем keystore из base64
      - name: Decode keystore
        run: |
          echo "🔐 Decoding keystore..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/keystore
          ls -la $HOME/keystore

      # Восстанавливаем google-services.json из base64
      - name: Decode Google Services
        run: |
          echo "📱 Decoding google-services.json..."
          mkdir -p app
          echo "${{ secrets.GOOGLE_SERVICES_BASE64 }}" | base64 --decode > app/google-services.json
          ls -la app/google-services.json

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Очистка чувствительных файлов
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f $HOME/keystore
          rm -f app/google-services.json
          echo "🧹 Cleanup completed"

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nekogram-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
